services:
  postgres:
    image: postgres:16.6-alpine
    container_name: steam-tracker-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-steam_tracker}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  redis:
    image: redis:7.4-alpine
    container_name: steam-tracker-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
      target: development
    container_name: steam-tracker-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - apps/backend/.env
    environment:
      NODE_ENV: development
      PORT: 3000
      OPENAPI_ENABLED: ${OPENAPI_ENABLED:-true}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3001}
      BACKEND_PUBLIC_URL: ${BACKEND_PUBLIC_URL:-http://localhost:3000}
      FRONTEND_PUBLIC_URL: ${FRONTEND_PUBLIC_URL:-http://localhost:3001}
      AUTH_SESSION_COOKIE_NAME: ${AUTH_SESSION_COOKIE_NAME:-steam_auth_session}
      AUTH_STATE_COOKIE_NAME: ${AUTH_STATE_COOKIE_NAME:-steam_auth_state}
      AUTH_SESSION_TTL_DAYS: ${AUTH_SESSION_TTL_DAYS:-14}
      AUTH_STATE_TTL_SECONDS: ${AUTH_STATE_TTL_SECONDS:-300}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/steam_tracker}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      SYNC_QUEUE_NAME: ${SYNC_QUEUE_NAME:-steam-sync}
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    volumes:
      - .:/workspace
      - root-node-modules:/workspace/node_modules
      - backend-node-modules:/workspace/apps/backend/node_modules
    command: pnpm dev

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: development
    container_name: steam-tracker-web
    depends_on:
      backend:
        condition: service_started
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:3000}
      WATCHPACK_POLLING: "true"
    ports:
      - "${WEB_PORT:-3001}:3000"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - >
          fetch('http://127.0.0.1:3000/')
            .then((response) => process.exit(response.ok ? 0 : 1))
            .catch(() => process.exit(1))
    volumes:
      - .:/workspace
      - root-node-modules:/workspace/node_modules
      - web-node-modules:/workspace/apps/web/node_modules
      - client-sdk-node-modules:/workspace/libs/client-sdk/node_modules
    command: pnpm dev

volumes:
  postgres-data:
  root-node-modules:
  backend-node-modules:
  web-node-modules:
  client-sdk-node-modules:
